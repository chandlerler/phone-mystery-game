<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <!--
    viewport-fit=cover 让页面在全面屏设备上正确使用可视区域；
    interactive-widget=resizes-content 让软键盘弹出时缩小页面，而不是遮住密码输入框。
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
  <!-- 这是单文件原型，禁用本地页面缓存可以减少手机继续显示旧版本的概率。 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>雾港来信 - 手机解谜 MVP</title>
  <style>
    /*
      这个文件是一个“最小可玩模型”：
      - 所有界面、剧本、谜题逻辑都放在同一个 HTML 中，方便你直接打开试玩。
      - 后续正式开发时，可以把 GAME_DATA 拆成 JSON 文件，把每个 App 拆成独立组件。
      - 注释会尽量解释“为什么这样写”，而不是只解释语法。
    */

    :root {
      color-scheme: dark;
      --bg: #111318;
      --bg-soft: #191c24;
      --glass: rgba(25, 28, 36, .72);
      --glass-strong: rgba(30, 34, 44, .9);
      --line: rgba(255, 255, 255, .12);
      --text: #f5f6fa;
      --muted: #a8afbf;
      --dim: #788194;
      --green: #40d883;
      --cyan: #6ed6ff;
      --blue: #5a8cff;
      --pink: #ff7ba8;
      --amber: #ffcc66;
      --danger: #ff6b78;
      --shadow: 0 24px 80px rgba(0, 0, 0, .45);
      --radius-phone: 42px;
      --radius-app: 24px;
      --font: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: #07080b;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      color: var(--text);
      font-family: var(--font);
      background:
        radial-gradient(circle at 18% 16%, rgba(110, 214, 255, .2), transparent 28%),
        radial-gradient(circle at 82% 12%, rgba(255, 123, 168, .16), transparent 30%),
        linear-gradient(135deg, #0f1117 0%, #1b2030 42%, #12151c 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent, rgba(255, 255, 255, .035), transparent),
        radial-gradient(circle at 50% 100%, rgba(64, 216, 131, .08), transparent 34%);
      opacity: .8;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .stage {
      width: min(100vw, 520px);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    .progress-list {
      display: grid;
      gap: 10px;
      margin-top: 26px;
    }

    .progress-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      line-height: 1.5;
    }

    .progress-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .22);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, .04);
      flex: 0 0 auto;
    }

    .progress-item.done {
      color: var(--text);
    }

    .progress-item.done .progress-dot {
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(64, 216, 131, .16);
    }

    .phone-shell {
      width: min(100%, 410px);
      aspect-ratio: 9 / 19.5;
      margin-inline: auto;
      padding: 12px;
      border-radius: var(--radius-phone);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, .18), transparent 18%),
        linear-gradient(330deg, rgba(255, 255, 255, .08), transparent 22%),
        #07080b;
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(255, 255, 255, .08);
      position: relative;
      animation: phoneRise .45s ease both;
    }

    .phone {
      height: 100%;
      overflow: hidden;
      border-radius: calc(var(--radius-phone) - 12px);
      position: relative;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .1), transparent 34%),
        radial-gradient(circle at 30% 10%, rgba(110, 214, 255, .35), transparent 32%),
        radial-gradient(circle at 78% 4%, rgba(255, 204, 102, .24), transparent 28%),
        linear-gradient(160deg, #1b2433, #0d1119 58%, #171922);
    }

    /*
      =====================
      游戏初始菜单
      =====================
      菜单覆盖在整台模拟手机上方，因此玩家第一次打开链接时不会提前看到锁屏。
      进入游戏后可以通过状态栏左侧的菜单按钮再次打开它。
    */
    .start-menu {
      position: absolute;
      inset: 0;
      z-index: 100;
      display: none;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      padding: 54px 28px 26px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .06), transparent 24%),
        linear-gradient(145deg, #111821 0%, #080a0f 58%, #15121a 100%);
    }

    .start-menu.active {
      display: flex;
      animation: menuIn .36s ease both;
    }

    .start-menu::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .42;
      background-image:
        linear-gradient(rgba(255, 255, 255, .03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .025) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, black, transparent 74%);
    }

    .menu-close {
      width: 36px;
      height: 36px;
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 2;
      display: none;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 8px;
      color: rgba(255, 255, 255, .82);
      background: rgba(255, 255, 255, .06);
      font-size: 24px;
      line-height: 1;
    }

    .menu-close.visible {
      display: grid;
    }

    .menu-heading,
    .menu-actions,
    .menu-footer {
      position: relative;
      z-index: 1;
    }

    .menu-kicker {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--green);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .menu-kicker::before {
      content: "";
      width: 26px;
      height: 2px;
      background: var(--green);
    }

    .menu-title {
      margin: 20px 0 8px;
      font-size: 48px;
      line-height: 1.08;
      font-weight: 650;
      letter-spacing: 0;
    }

    .menu-subtitle {
      max-width: 290px;
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }

    .menu-mark {
      width: 100%;
      height: 116px;
      position: relative;
      margin-top: 34px;
      border-top: 1px solid rgba(255, 255, 255, .12);
      border-bottom: 1px solid rgba(255, 255, 255, .08);
      overflow: hidden;
    }

    .menu-mark::before {
      content: "07 / 17";
      position: absolute;
      left: 0;
      top: 18px;
      color: rgba(255, 255, 255, .08);
      font-size: 68px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }

    .menu-mark::after {
      content: "最后同步 22:17";
      position: absolute;
      right: 0;
      bottom: 14px;
      color: var(--amber);
      font-size: 11px;
    }

    .menu-actions {
      display: grid;
      gap: 9px;
      margin-top: auto;
    }

    .menu-action {
      min-height: 48px;
      display: grid;
      grid-template-columns: 30px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      border: 1px solid rgba(255, 255, 255, .13);
      border-radius: 8px;
      text-align: left;
      background: rgba(255, 255, 255, .055);
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }

    .menu-action:hover,
    .menu-action:focus-visible {
      border-color: rgba(110, 214, 255, .52);
      background: rgba(110, 214, 255, .09);
      outline: none;
    }

    .menu-action:active {
      transform: scale(.985);
    }

    .menu-action.primary {
      border-color: transparent;
      color: #06120d;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      font-weight: 700;
    }

    .menu-action:disabled {
      cursor: not-allowed;
      opacity: .38;
      transform: none;
    }

    .menu-action-icon {
      font-size: 18px;
      text-align: center;
    }

    .menu-action-meta {
      color: currentColor;
      opacity: .58;
      font-size: 11px;
    }

    .save-summary {
      min-height: 18px;
      margin: 4px 2px 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }

    .save-summary.success {
      color: var(--green);
    }

    .menu-footer {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, .09);
      color: var(--dim);
      font-size: 10px;
    }

    .speaker {
      width: 96px;
      height: 26px;
      border-radius: 0 0 18px 18px;
      background: #07080b;
      position: absolute;
      top: 0;
      left: 50%;
      z-index: 20;
      transform: translateX(-50%);
    }

    .status-bar {
      height: 44px;
      padding: 12px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 500;
      position: relative;
      z-index: 42;
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .menu-launcher {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      padding: 0;
      border-radius: 6px;
      color: rgba(255, 255, 255, .84);
      background: rgba(255, 255, 255, .08);
      font-size: 15px;
      line-height: 1;
    }

    .shade-grip {
      position: absolute;
      left: 50%;
      top: 7px;
      width: 116px;
      height: 28px;
      transform: translateX(-50%);
      border-radius: 0 0 18px 18px;
      background: transparent;
      z-index: 44;
      cursor: grab;
    }

    .signal {
      display: flex;
      align-items: center;
      gap: 5px;
      color: rgba(255, 255, 255, .88);
    }

    .battery {
      width: 24px;
      height: 12px;
      border: 1.5px solid currentColor;
      border-radius: 4px;
      padding: 2px;
      position: relative;
    }

    .battery::after {
      content: "";
      width: 2px;
      height: 6px;
      border-radius: 0 2px 2px 0;
      background: currentColor;
      position: absolute;
      right: -4px;
      top: 2px;
    }

    .battery span {
      display: block;
      width: 72%;
      height: 100%;
      border-radius: 2px;
      background: var(--green);
    }

    .screen {
      position: absolute;
      inset: 44px 0 0;
      display: flex;
      flex-direction: column;
    }

    .home-screen,
    .app-screen,
    .lock-screen {
      position: absolute;
      inset: 0;
      display: none;
      animation: appIn .22s ease both;
    }

    .home-screen.active,
    .app-screen.active,
    .lock-screen.active {
      display: flex;
    }

    .lock-screen {
      z-index: 32;
      flex-direction: column;
      justify-content: space-between;
      padding: 54px 24px 26px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .08), transparent 38%),
        radial-gradient(circle at 50% 18%, rgba(110, 214, 255, .24), transparent 32%),
        linear-gradient(160deg, #161b26, #090b10 68%);
    }

    .lock-top {
      text-align: center;
    }

    .lock-time {
      font-size: 64px;
      line-height: 1;
      font-weight: 500;
    }

    .lock-date {
      margin-top: 8px;
      color: rgba(255, 255, 255, .72);
      font-size: 14px;
    }

    .lock-notice {
      margin-top: 28px;
      padding: 13px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      background: rgba(255, 255, 255, .11);
      border: 1px solid rgba(255, 255, 255, .13);
      backdrop-filter: blur(16px);
      animation: notifyIn .55s ease both .25s;
    }

    .lock-unlock {
      display: grid;
      gap: 12px;
    }

    .lock-hint {
      text-align: center;
      color: rgba(255, 255, 255, .72);
      font-size: 13px;
    }

    .lock-pass {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .lock-pass input {
      min-width: 0;
      height: 46px;
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 16px;
      padding: 0 14px;
      background: rgba(255, 255, 255, .1);
      color: var(--text);
      outline: none;
      text-align: center;
      letter-spacing: 6px;
    }

    .lock-pass input:focus {
      border-color: rgba(110, 214, 255, .72);
      box-shadow: 0 0 0 4px rgba(110, 214, 255, .13);
    }

    .unlock-btn {
      width: 54px;
      height: 46px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      color: #071015;
      font-size: 20px;
    }

    .lock-error {
      min-height: 20px;
      color: var(--danger);
      text-align: center;
      font-size: 12px;
    }

    .swipe-pill {
      width: 132px;
      height: 5px;
      margin: 4px auto 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, .48);
      animation: breathe 1.8s ease-in-out infinite;
    }

    .home-screen {
      flex-direction: column;
      padding: 26px 24px 22px;
    }

    .date-card {
      margin-top: 12px;
    }

    .date-card .time {
      font-size: 54px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: 0;
    }

    .date-card .date {
      margin-top: 6px;
      color: rgba(255, 255, 255, .72);
      font-size: 14px;
    }

    .notice {
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, .1);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, .12);
      animation: notifyIn .45s ease both .15s;
    }

    .notice-icon {
      width: 34px;
      height: 34px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--green), #1a9f62);
      font-size: 18px;
    }

    .notice b {
      display: block;
      font-size: 13px;
      font-weight: 500;
    }

    .notice span {
      color: rgba(255, 255, 255, .72);
      font-size: 12px;
    }

    .app-grid {
      margin-top: auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px 14px;
    }

    .app-icon {
      display: grid;
      justify-items: center;
      gap: 7px;
      background: transparent;
      padding: 0;
    }

    .icon-tile {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 25px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, .24), inset 0 1px 0 rgba(255, 255, 255, .28);
      position: relative;
      transition: transform .16s ease, filter .16s ease;
    }

    .app-icon:active .icon-tile,
    .choice-btn:active,
    .small-btn:active,
    .back-btn:active,
    .desktop-btn:active,
    .notice:active,
    .photo-card:active {
      transform: scale(.96);
      filter: brightness(1.12);
    }

    .app-icon > span:not(.icon-tile) {
      max-width: 68px;
      color: rgba(255, 255, 255, .88);
      font-size: 12px;
      text-shadow: 0 1px 5px rgba(0, 0, 0, .55);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      position: absolute;
      right: -6px;
      top: -5px;
      background: var(--danger);
      color: white;
      font-size: 11px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, .32);
    }

    .dock {
      margin-top: 22px;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      border-radius: 28px;
      background: rgba(255, 255, 255, .12);
      border: 1px solid rgba(255, 255, 255, .1);
      backdrop-filter: blur(18px);
    }

    .app-screen {
      flex-direction: column;
      background: var(--bg);
    }

    .notification-shade {
      position: absolute;
      inset: -44px 0 auto;
      min-height: 390px;
      padding: 58px 16px 18px;
      border-radius: 0 0 30px 30px;
      background: rgba(14, 17, 24, .86);
      border-bottom: 1px solid rgba(255, 255, 255, .12);
      backdrop-filter: blur(24px);
      box-shadow: 0 28px 70px rgba(0, 0, 0, .42);
      transform: translateY(-108%);
      transition: transform .32s cubic-bezier(.2, .8, .2, 1);
      z-index: 40;
    }

    .notification-shade.open {
      transform: translateY(0);
    }

    .shade-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(255, 255, 255, .78);
      font-size: 13px;
      margin-bottom: 14px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .quick-toggle {
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      gap: 3px;
      background: rgba(255, 255, 255, .09);
      color: rgba(255, 255, 255, .86);
      font-size: 12px;
    }

    .quick-toggle.on {
      background: linear-gradient(135deg, rgba(64, 216, 131, .92), rgba(110, 214, 255, .78));
      color: #061015;
    }

    .shade-card {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-radius: 18px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, .1);
      border: 1px solid rgba(255, 255, 255, .1);
      text-align: left;
      width: 100%;
    }

    .shade-card b,
    .lock-notice b {
      display: block;
      margin-bottom: 3px;
      font-size: 13px;
      font-weight: 500;
    }

    .shade-card span,
    .lock-notice span {
      color: rgba(255, 255, 255, .7);
      font-size: 12px;
      line-height: 1.45;
    }

    .shade-close {
      width: 118px;
      height: 5px;
      margin: 14px auto 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, .42);
      display: block;
    }

    .app-header {
      min-height: 52px;
      padding: 8px 12px;
      display: grid;
      grid-template-columns: 42px 1fr 42px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      background: rgba(20, 22, 29, .92);
    }

    .app-title {
      text-align: center;
      font-size: 15px;
      font-weight: 500;
    }

    .back-btn,
    .small-btn,
    .home-indicator-btn {
      border-radius: 14px;
      background: rgba(255, 255, 255, .08);
      min-height: 36px;
    }

    .back-btn {
      width: 38px;
    }

    .small-btn {
      padding: 0 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .app-body {
      min-height: 0;
      flex: 1;
      overflow: auto;
    }

    .bottom-home {
      height: 24px;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, .12);
    }

    .home-indicator-btn {
      width: 128px;
      height: 5px;
      min-height: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .42);
      padding: 0;
    }

    .chat-layout {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100%;
    }

    .contact-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .03);
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #7bdcff, #5a8cff);
      color: #07111f;
      font-weight: 500;
    }

    .contact-card b {
      display: block;
      font-size: 14px;
      font-weight: 500;
    }

    .contact-card span {
      color: var(--muted);
      font-size: 12px;
    }

    .messages {
      padding: 14px;
      overflow: auto;
      background:
        linear-gradient(rgba(255, 255, 255, .025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .025) 1px, transparent 1px),
        #11141b;
      background-size: 22px 22px;
    }

    .msg {
      max-width: 82%;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      animation: messageIn .24s ease both;
    }

      position: relative;
      display: grid;
      place-items: center;
      overflow: hidden;

      content: "";

      height: 58%;

      border: 2px solid rgba(255, 255, 255, .38);

      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);

      color: var(--text);
      font-weight: 500;

    .desktop-btn.primary {
      background: linear-gradient(135deg, var(--green), var(--cyan));
      color: #071015;
      border-color: transparent;
    }

    .toast {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 52px;
      z-index: 46;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(28, 32, 42, .92);
      border: 1px solid rgba(255, 255, 255, .12);
      box-shadow: 0 18px 45px rgba(0, 0, 0, .32);
      backdrop-filter: blur(18px);
      animation: toastDrop 3.2s ease both;
      pointer-events: none;
    }

    @keyframes phoneRise {
      from { transform: translateY(16px) scale(.985); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes appIn {
      from { transform: translateY(10px); opacity: .6; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes notifyIn {
      from { transform: translateY(-8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes messageIn {
      from { transform: translateY(6px) scale(.98); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes toastDrop {
      0% { transform: translateY(-22px); opacity: 0; }
      12%, 78% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-18px); opacity: 0; }
    }

    @keyframes breathe {
      0%, 100% { opacity: .45; transform: scaleX(.88); }
      50% { opacity: .9; transform: scaleX(1); }
    }

    @keyframes menuIn {
      from { opacity: 0; transform: scale(1.015); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 820px) {
      body {
        display: block;
      }

      .stage {
        min-height: 100vh;
        padding: 16px;
      }

      .phone-shell {
        width: min(100%, 390px);
      }
    }

    @media (max-width: 420px) {
      /*
        手机上的关键修复：父级必须有明确的 height，内部的 height: 100% 才能计算。
        之前这里只有 min-height，导致 .phone 在部分安卓浏览器里高度塌缩，
        锁屏内容层也随之变成 0，只剩顶部状态栏和一大片黑色外壳背景。

        先写 100vh 兼容旧浏览器，再用 100dvh 覆盖：动态视口单位会自动扣除
        浏览器地址栏和底部工具栏，更适合手机竖屏网页。
      */
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .stage {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        min-height: 0;
        padding: 0;
      }

      .phone-shell {
        width: 100%;
        height: 100%;
        min-height: 0;
        aspect-ratio: auto;
        border-radius: 0;
        padding: 0;
      }

      .phone {
        width: 100%;
        height: 100%;
        min-height: 0;
        border-radius: 0;
      }

      .speaker {
        display: none;
      }

      .start-menu {
        padding-top: max(42px, env(safe-area-inset-top));
        padding-bottom: max(22px, env(safe-area-inset-bottom));
      }

      .menu-title {
        font-size: 44px;
      }
    }
  </style>
</head>

    const GAME_CREATOR = "chandlerler";

      ],
      chatOpening: [

      ],
      photoClue: "照片背面有一行小字：雾港旧码头，7月17日，别迟到。",
      docText: "未命名档案\n\n项目代号：回声。\n最后同步时间：07/17 22:17。\n备注：林夏只会把重要东西锁进四位日期里。",
      browserResults: [
        {
          title: "雾港旧码头停运公告",

        },
        {
          title: "本地论坛：有人听见回声吗？",
          url: "local.search/forum-echo",

    /*
      =====================
      二、游戏状态
      =====================
      state 记录玩家已经看过哪些线索、是否解锁结局等。
      localStorage 负责自动存档：刷新页面后仍然保留进度。
    */
    const defaultState = {
      phoneUnlocked: false,
      openedChat: false,
      viewedPhoto: false,
      searchedPier: false,
      readDoc: false,
      unlockedVault: false,
      endingSeen: false,
      chatStep: 0,
      activeApp: null
    };

    const STORAGE_KEY = "fogport-phone-mystery-mvp";
    const SAVE_META_KEY = "fogport-phone-mystery-save-meta";
    let state = loadState();
    let gameSessionStarted = false;

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return { ...defaultState };
      try {
        return { ...defaultState, ...JSON.parse(saved) };
      } catch {
        return { ...defaultState };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      localStorage.setItem(SAVE_META_KEY, JSON.stringify({
        savedAt: new Date().toISOString(),
        version: GAME_VERSION
      }));
      renderProgress();
      updateBadges();
      updateStartMenu();
    }

    /* 旧版本没有单独的存档信息；读取失败时返回 null，不影响旧进度兼容。 */
    function readSaveMeta() {
      try {
        const value = localStorage.getItem(SAVE_META_KEY);
        return value ? JSON.parse(value) : null;
      } catch {
        return null;
      }
    }

    /*
      =====================
      三、基础 DOM 工具
      =====================
      小项目可以直接操作 DOM；后续变复杂后，可以迁移成 React/Vue 的组件状态。
    */
    const $ = (selector) => document.querySelector(selector);
    const appBody = $("#appBody");
    const appTitle = $("#appTitle");
    const lockScreen = $("#lockScreen");
    const homeScreen = $("#homeScreen");
    const appScreen = $("#appScreen");
    const notificationShade = $("#notificationShade");
    const startMenu = $("#startMenu");
    const loadGameBtn = $("#loadGameBtn");
    const saveGameBtn = $("#saveGameBtn");
    const menuCloseBtn = $("#menuCloseBtn");
    const saveSummary = $("#saveSummary");

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function mark(key) {
      state[key] = true;
      saveState();
    }

    function showToast(title, text) {
      const oldToast = $(".toast");
      if (oldToast) oldToast.remove();
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.innerHTML = `
        <span class="notice-icon">信</span>
        <span>
          <b>${escapeHtml(title)}</b>
          <span>${escapeHtml(text)}</span>
        </span>
      `;
      $(".phone").appendChild(toast);
      setTimeout(() => toast.remove(), 3300);
    }

    /*
      =====================
      四、主菜单与手动存档
      =====================
      游戏过程仍然自动保存；菜单中的“保存游戏”提供一个明确的手动保存动作。
      “读取游戏”会恢复上次所在应用，旧版存档缺少元数据时也可以继续读取。
    */
    function hasStoredSave() {
      try {
        return Boolean(localStorage.getItem(STORAGE_KEY));
      } catch {
        return false;
      }
    }

    function formatSaveTime(isoText) {
      if (!isoText) return "发现旧版存档，可以继续读取";
      const date = new Date(isoText);
      if (Number.isNaN(date.getTime())) return "已有本地存档";
      return `上次保存：${date.toLocaleString("zh-CN", {
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      })}`;
    }

    function updateStartMenu(message = "", success = false) {
      const hasSave = hasStoredSave();
      const meta = readSaveMeta();

      loadGameBtn.disabled = !hasSave;
      saveGameBtn.disabled = !gameSessionStarted;
      menuCloseBtn.classList.toggle("visible", gameSessionStarted);
      $("#menuVersion").textContent = `v${GAME_VERSION}`;

      saveSummary.classList.toggle("success", success);
      if (message) {
        saveSummary.textContent = message;
      } else if (hasSave) {
        saveSummary.textContent = `${formatSaveTime(meta?.savedAt)} · v${meta?.version || "1.00"}`;
      } else {
        saveSummary.textContent = "暂无存档，开始游戏后将自动保存";
      }
    }

    function openStartMenu() {
      closeNotificationShade();
      startMenu.classList.add("active");
      startMenu.setAttribute("aria-hidden", "false");
      updateStartMenu();
    }

    function closeStartMenu() {
      if (!gameSessionStarted) return;
      startMenu.classList.remove("active");
      startMenu.setAttribute("aria-hidden", "true");
    }

    function startNewGame() {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(SAVE_META_KEY);
      state = { ...defaultState };
      gameSessionStarted = true;
      saveState();
      initScreen();
      closeStartMenu();
      $("#phonePassInput").value = "";
      $("#phoneLockError").textContent = "";
    }

    function loadSavedGame() {
      if (!hasStoredSave()) {
        updateStartMenu("没有找到可读取的本地存档");
        return;
      }

      state = loadState();
      gameSessionStarted = true;
      closeStartMenu();

      if (!state.phoneUnlocked) {
        initScreen();
      } else if (state.activeApp) {
        openApp(state.activeApp);
      } else {
        goHome();
      }
    }

    function manuallySaveGame() {
      if (!gameSessionStarted) return;
      saveState();
      updateStartMenu("当前进度已保存", true);
    }

    /*
      =====================
      五、导航系统
      =====================
      openApp 根据 app 名称渲染不同模拟应用。
      每个 App 都是一个 renderXxx 函数，这样后续添加“邮箱”“短信”“地图”会很直观。
    */
    function openApp(appName) {
      if (!state.phoneUnlocked) {
        $("#phoneLockError").textContent = "先解锁手机。提示：最后同步时间是 22:17。";
        $("#phonePassInput").focus();
        return;
      }

      state.activeApp = appName;
      closeNotificationShade();
      lockScreen.classList.remove("active");
      homeScreen.classList.remove("active");
      appScreen.classList.add("active");
      appTitle.textContent = GAME_DATA.apps[appName] || "应用";

      const renderMap = {
        chat: renderChat,
        gallery: renderGallery,
        docs: renderDocs,
        browser: renderBrowser,
        social: renderSocial,
        videos: renderVideos,
        vault: renderVault,
        ending: renderEnding,
        help: renderHelp
      };

      renderMap[appName]();
      saveState();
    }

    function goHome() {
      state.activeApp = null;
      closeNotificationShade();
      lockScreen.classList.remove("active");
      appScreen.classList.remove("active");
      homeScreen.classList.add("active");
      saveState();
    }

    function initScreen() {
      if (state.phoneUnlocked) {
        lockScreen.classList.remove("active");
        homeScreen.classList.add("active");
      } else {
        lockScreen.classList.add("active");
        homeScreen.classList.remove("active");
        appScreen.classList.remove("active");
      }
    }

    function unlockPhone() {
      const value = $("#phonePassInput").value.trim();
      if (value === GAME_DATA.phonePassword) {
        state.phoneUnlocked = true;
        saveState();
        $("#phoneLockError").textContent = "";
        goHome();
        showToast("微讯 · 林夏", "你终于上线了。");
      } else {
        $("#phoneLockError").textContent = "手机密码不对。提示：林夏最后同步的时间。";
        $("#phonePassInput").select();
      }
    }

    function toggleNotificationShade(forceOpen) {
      if (!state.phoneUnlocked) {
        $("#phoneLockError").textContent = "通知栏已锁定，先输入手机密码。";
        return;
      }
      const shouldOpen = typeof forceOpen === "boolean" ? forceOpen : !notificationShade.classList.contains("open");
      notificationShade.classList.toggle("open", shouldOpen);
      notificationShade.setAttribute("aria-hidden", String(!shouldOpen));
    }

    function closeNotificationShade() {
      notificationShade.classList.remove("open");
      notificationShade.setAttribute("aria-hidden", "true");
    }

    /*
      =====================
      五、聊天 App
      =====================
      这个 MVP 用“点击选项推进剧情”的方式模拟聊天。
      你以后可以把 choice 变成多分支，并让不同选择影响角色信任度。
    */
    function renderChat() {
      mark("openedChat");

      const visibleMessages = GAME_DATA.chatOpening.slice(0, Math.max(1, state.chatStep + 1));
      const messagesHtml = visibleMessages.map((text, index) => `
        <div class="msg npc">
          <div class="bubble">${escapeHtml(text)}</div>
          <div class="msg-time">${index === 0 ? "22:17" : "刚刚"}</div>
        </div>
      `).join("");

      const playerReply = state.chatStep >= 3 ? `
        <div class="msg player">
          <div class="bubble">我去查相册和旧码头。</div>
          <div class="msg-time">已发送</div>
        </div>
      ` : "";

      appBody.innerHTML = `
        <div class="chat-layout">
          <div class="contact-card">
            <div class="avatar">林</div>
            <div>
              <b>林夏</b>
              <span>${state.unlockedVault ? "在线 · 等你做最后决定" : "在线 · 消息已加密"}</span>
            </div>
          </div>
          <div class="messages" id="messages">
            ${messagesHtml}
            ${playerReply}
          </div>
          <div class="choice-panel">
            ${chatChoicesHtml()}
          </div>
        </div>
      `;

      $("#messages").scrollTop = $("#messages").scrollHeight;
    }

    function chatChoicesHtml() {
      if (state.chatStep < GAME_DATA.chatOpening.length - 1) {
        return `<button class="choice-btn primary" type="button" data-chat-next>继续听她说</button>`;
      }

      if (!state.viewedPhoto) {
        return `
          <button class="choice-btn" type="button" data-open-app="gallery">打开相册查看“拍坏的码头照片”</button>
          <button class="choice-btn" type="button" data-chat-reply>回复：我马上去找</button>
        `;
      }

      if (!state.unlockedVault) {
        return `
          <button class="choice-btn" type="button" data-open-app="browser">搜索“雾港旧码头”</button>
          <button class="choice-btn" type="button" data-open-app="vault">尝试打开私密箱</button>
        `;
      }

      return `<button class="choice-btn primary" type="button" data-open-app="ending">查看结局</button>`;
    }

    /*
      =====================
      六、相册 App
      =====================
      点击关键照片后，设置 viewedPhoto=true。
      这就是最基础的“看过某线索后解锁后续内容”。
    */
    function renderGallery() {

              <span><b>IMG_0717</b><br>曝光失败的码头照片</span>

            </div>
          </button>
          <button class="photo-card" type="button" data-photo="street">
            <div class="photo-thumb" style="background:linear-gradient(135deg,rgba(255,123,168,.34),rgba(90,140,255,.28)),#262a36"></div>

            </div>

    function inspectPhoto(photoId) {
      if (photoId !== "pier") {
        appBody.insertAdjacentHTML("afterbegin", `<div class="empty-hint">这张照片没有明显异常。</div>`);
        return;
      }

        <div class="gallery">

          </div>
          <button class="choice-btn primary" type="button" data-open-app="browser">去浏览器搜索“雾港旧码头”</button>
        </div>
      `;
    }

    /*
      =====================
      七、文档 App
      =====================
      文档提供“密码规则”：重要东西锁进四位日期。
      与相册中的 7月17日 组合，得到 0717。
    */
    function renderDocs() {

        <div class="notes-list">

      `;

    /*

      八、浏览器 App
      =====================
      搜索关键词命中后才显示关键结果，并记录 searchedPier。
      这能模拟“玩家主动输入线索”的解谜感。
    */
    function renderBrowser() {
      appBody.innerHTML = `
        <div class="browser">
          <div class="search-row">
            <input id="searchInput" type="search" placeholder="搜索网页或输入网址" value="${state.searchedPier ? "雾港旧码头" : ""}">
            <button class="small-btn" type="button" id="searchBtn">搜索</button>
          </div>
          <div id="searchResults">
            ${state.searchedPier ? browserResultsHtml() : '<div class="empty-hint">试着搜索你在照片里看到的地点。</div>'}
          </div>
        </div>
      `;
    }

    function browserResultsHtml() {
      return GAME_DATA.browserResults.map(item => `
        <article class="browser-result">
          <b>${escapeHtml(item.title)}</b>
          <small>${escapeHtml(item.url)}</small>
          <p>${escapeHtml(item.text)}</p>
        </article>
      `).join("") + `
        <button class="choice-btn primary" type="button" data-open-app="vault">线索足够了，去试私密箱</button>
      `;
    }

    function doSearch() {
      const keyword = $("#searchInput").value.trim();
      const matched = keyword.includes("雾港旧码头") || keyword.includes("旧码头") || keyword.includes("0717");
      if (matched) {
        mark("searchedPier");
        $("#searchResults").innerHTML = browserResultsHtml();
      } else {
        $("#searchResults").innerHTML = `<div class="empty-hint">没有找到有用结果。也许关键词需要更接近照片上的地点。</div>`;
      }
    }

    /*
      =====================
      十一、提示、进度、重置
      =====================
      这部分不是游戏必需，但很适合原型阶段测试流程是否顺畅。
    */
    function currentHint() {
      if (!state.openedChat) return "先打开“微讯”，读林夏的消息。";
      if (!state.viewedPhoto) return "去“相册”点开 IMG_0717，那张曝光失败的码头照片。";
      if (!state.searchedPier) return "去“浏览器”搜索“雾港旧码头”。";
      if (!state.readDoc) return "打开“文档”，读未命名档案，确认密码规则。";
      if (!state.unlockedVault) return "私密箱密码是四位日期：7月17日写成 0717。";
      return "已经解锁私密箱，可以查看结局。";
    }

    function renderProgress() {
      const progressList = $("#progressList");
      if (!progressList) return;
      progressList.innerHTML = GAME_DATA.progress.map(item => `
        <div class="progress-item ${state[item.key] ? "done" : ""}">
          <span class="progress-dot"></span>
          <span>${escapeHtml(item.text)}</span>
        </div>
      `).join("");
    }

    function updateBadges() {
      $("#chatBadge").style.display = state.openedChat ? "none" : "grid";
      $("#noticeText").textContent = state.unlockedVault ? "你已经拿到真正的档案了。" : "我把线索留在旧手机里了。";
      $("#shadeNoticeText").textContent = state.unlockedVault ? "你已经拿到真正的档案了。" : "我把线索留在旧手机里了。";
    }

    function resetGame() {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(SAVE_META_KEY);
      state = { ...defaultState };
      gameSessionStarted = true;
      saveState();
      closeNotificationShade();
      initScreen();
    }

    function tickClock() {
      const now = new Date();
      const text = now.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", hour12: false });
      $("#clock").textContent = text;
      $("#homeTime").textContent = text;
      $("#lockTime").textContent = text;
      $("#shadeDate").textContent = now.toLocaleDateString("zh-CN", { month: "long", day: "numeric", weekday: "long" });
    }

    /*
      =====================
      十二、事件委托
      =====================
      使用事件委托可以让动态生成的按钮也自动生效。
      例如 renderChat 重新绘制后，新按钮不需要重新单独绑定事件。
    */
    document.addEventListener("click", (event) => {
      if (event.target.closest("#newGameBtn")) {
        startNewGame();
        return;
      }

      if (event.target.closest("#loadGameBtn")) {
        loadSavedGame();
        return;
      }

      if (event.target.closest("#saveGameBtn")) {
        manuallySaveGame();
        return;
      }

      if (event.target.closest("#menuLauncher")) {
        openStartMenu();
        return;
      }

      if (event.target.closest("#menuCloseBtn")) {
        closeStartMenu();
        return;
      }

      if (event.target.closest("#phoneUnlockBtn")) {
        unlockPhone();
        return;
      }

      if (event.target.closest("#shadeGrip")) {
        toggleNotificationShade();
        return;
      }

      if (event.target.closest("#shadeClose")) {
        closeNotificationShade();
        return;
      }

      if (event.target.closest("[data-lock-open-chat]")) {
        $("#phonePassInput").focus();
        $("#phoneLockError").textContent = "先解锁手机。提示：最后同步时间是 22:17。";
        return;
      }

      if (event.target.closest("#desktopHint")) {
        alert(currentHint());
        return;
      }

      if (event.target.closest("#resetGame")) {
        resetGame();
        return;
      }

      const openButton = event.target.closest("[data-open-app]");
      if (openButton) {
        openApp(openButton.dataset.openApp);
        return;
      }

      if (event.target.closest("[data-chat-next]")) {
        state.chatStep += 1;
        saveState();
        renderChat();
        return;
      }

      if (event.target.closest("[data-chat-reply]")) {
        state.chatStep = GAME_DATA.chatOpening.length;
        saveState();
        renderChat();
        return;
      }

      const photoButton = event.target.closest("[data-photo]");
      if (photoButton) {
        inspectPhoto(photoButton.dataset.photo);
      }
    });

    $("#backBtn").addEventListener("click", goHome);
    $("#homeBtn").addEventListener("click", goHome);
    $("#hintBtn").addEventListener("click", () => alert(currentHint()));

    appBody.addEventListener("click", (event) => {
      if (event.target.id === "searchBtn") doSearch();
      if (event.target.id === "unlockBtn") tryUnlock();
    });

    appBody.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && event.target.id === "searchInput") doSearch();
      if (event.key === "Enter" && event.target.id === "passInput") tryUnlock();
    });

    $("#phonePassInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") unlockPhone();
    });

    /*
      =====================
      十三、手机手势
      =====================
      这里不是完整的系统级手势，只模拟玩家最常用的“顶部下拉通知栏”。
      使用 Pointer Events 可以同时兼容鼠标拖拽和手机触控。
    */
    let pointerStartY = null;
    $(".phone").addEventListener("pointerdown", (event) => {
      const isTopArea = event.clientY - $(".phone").getBoundingClientRect().top < 76;
      const shadeOpen = notificationShade.classList.contains("open");
      if (isTopArea || shadeOpen) pointerStartY = event.clientY;
    });

    $(".phone").addEventListener("pointerup", (event) => {
      if (pointerStartY === null) return;
      const deltaY = event.clientY - pointerStartY;
      pointerStartY = null;

      if (deltaY > 42) toggleNotificationShade(true);
      if (deltaY < -36) closeNotificationShade();
    });

    tickClock();
    setInterval(tickClock, 1000 * 20);
    initScreen();
    renderProgress();
    updateBadges();
    updateStartMenu();
  </script>
</body>
</html>
