<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <!--
    viewport-fit=cover 让页面在全面屏设备上正确使用可视区域；
    interactive-widget=resizes-content 让软键盘弹出时缩小页面，而不是遮住密码输入框。
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
  <!-- 这是单文件原型，禁用本地页面缓存可以减少手机继续显示旧版本的概率。 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <!-- 头像是首屏锁屏通知的一部分，提前加载可以减少图片闪现。 -->
  <link rel="preload" as="image" href="assets/avatars/linxia.jpg">
  <title>雾港来信：回声盲区</title>
  <style>
    /*
      这是一个用于验证玩法框架的最小可玩模型。
      页面负责模拟手机外观，剧情、线索、事件和结局位于 data 目录，运行逻辑位于 game.js。
      注释会尽量解释“为什么这样写”，而不是只解释语法。
    */

    :root {
      color-scheme: dark;
      --bg: #111318;
      --bg-soft: #191c24;
      --glass: rgba(25, 28, 36, .72);
      --glass-strong: rgba(30, 34, 44, .9);
      --line: rgba(255, 255, 255, .12);
      --text: #f5f6fa;
      --muted: #a8afbf;
      --dim: #788194;
      --green: #40d883;
      --cyan: #6ed6ff;
      --blue: #5a8cff;
      --pink: #ff7ba8;
      --amber: #ffcc66;
      --danger: #ff6b78;
      --shadow: 0 24px 80px rgba(0, 0, 0, .45);
      --radius-phone: 42px;
      --radius-app: 24px;
      --font: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: #07080b;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      color: var(--text);
      font-family: var(--font);
      background:
        radial-gradient(circle at 18% 16%, rgba(110, 214, 255, .2), transparent 28%),
        radial-gradient(circle at 82% 12%, rgba(255, 123, 168, .16), transparent 30%),
        linear-gradient(135deg, #0f1117 0%, #1b2030 42%, #12151c 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent, rgba(255, 255, 255, .035), transparent),
        radial-gradient(circle at 50% 100%, rgba(64, 216, 131, .08), transparent 34%);
      opacity: .8;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .stage {
      width: min(100vw, 520px);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    .progress-list {
      display: grid;
      gap: 10px;
      margin-top: 26px;
    }

    .progress-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      line-height: 1.5;
    }

    .progress-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .22);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, .04);
      flex: 0 0 auto;
    }

    .progress-item.done {
      color: var(--text);
    }

    .progress-item.done .progress-dot {
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(64, 216, 131, .16);
    }

    .phone-shell {
      width: min(100%, 410px);
      aspect-ratio: 9 / 19.5;
      margin-inline: auto;
      padding: 12px;
      border-radius: var(--radius-phone);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, .18), transparent 18%),
        linear-gradient(330deg, rgba(255, 255, 255, .08), transparent 22%),
        #07080b;
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(255, 255, 255, .08);
      position: relative;
      animation: phoneRise .45s ease both;
    }

    .phone {
      height: 100%;
      overflow: hidden;
      border-radius: calc(var(--radius-phone) - 12px);
      position: relative;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .1), transparent 34%),
        radial-gradient(circle at 30% 10%, rgba(110, 214, 255, .35), transparent 32%),
        radial-gradient(circle at 78% 4%, rgba(255, 204, 102, .24), transparent 28%),
        linear-gradient(160deg, #1b2433, #0d1119 58%, #171922);
    }

    /*
      =====================
      游戏初始菜单
      =====================
      菜单覆盖在整台模拟手机上方，因此玩家第一次打开链接时不会提前看到锁屏。
      进入游戏后可以通过状态栏左侧的菜单按钮再次打开它。
    */
    .start-menu {
      position: absolute;
      inset: 0;
      z-index: 100;
      display: none;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      padding: 54px 28px 26px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .06), transparent 24%),
        linear-gradient(145deg, #111821 0%, #080a0f 58%, #15121a 100%);
    }

    .start-menu.active {
      display: flex;
      animation: menuIn .36s ease both;
    }

    .start-menu::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .42;
      background-image:
        linear-gradient(rgba(255, 255, 255, .03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .025) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, black, transparent 74%);
    }

    .menu-close {
      width: 36px;
      height: 36px;
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 2;
      display: none;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 8px;
      color: rgba(255, 255, 255, .82);
      background: rgba(255, 255, 255, .06);
      font-size: 24px;
      line-height: 1;
    }

    .menu-close.visible {
      display: grid;
    }

    .menu-heading,
    .menu-actions,
    .menu-footer {
      position: relative;
      z-index: 1;
    }

    .menu-kicker {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--green);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .menu-kicker::before {
      content: "";
      width: 26px;
      height: 2px;
      background: var(--green);
    }

    .menu-title {
      margin: 20px 0 8px;
      font-size: 48px;
      line-height: 1.08;
      font-weight: 650;
      letter-spacing: 0;
    }

    .menu-subtitle {
      max-width: 290px;
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }

    .menu-mark {
      width: 100%;
      height: 116px;
      position: relative;
      margin-top: 34px;
      border-top: 1px solid rgba(255, 255, 255, .12);
      border-bottom: 1px solid rgba(255, 255, 255, .08);
      overflow: hidden;
    }

    .menu-mark::before {
      content: "07 / 17";
      position: absolute;
      left: 0;
      top: 18px;
      color: rgba(255, 255, 255, .08);
      font-size: 68px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }

    .menu-mark::after {
      content: "最后同步 22:17";
      position: absolute;
      right: 0;
      bottom: 14px;
      color: var(--amber);
      font-size: 11px;
    }

    .menu-actions {
      display: grid;
      gap: 9px;
      margin-top: auto;
    }

    .menu-action {
      min-height: 48px;
      display: grid;
      grid-template-columns: 30px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      border: 1px solid rgba(255, 255, 255, .13);
      border-radius: 8px;
      text-align: left;
      background: rgba(255, 255, 255, .055);
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }

    .menu-action:hover,
    .menu-action:focus-visible {
      border-color: rgba(110, 214, 255, .52);
      background: rgba(110, 214, 255, .09);
      outline: none;
    }

    .menu-action:active {
      transform: scale(.985);
    }

    .menu-action.primary {
      border-color: transparent;
      color: #06120d;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      font-weight: 700;
    }

    .menu-action.continue-action {
      border-color: rgba(64, 216, 131, .4);
      background: rgba(64, 216, 131, .1);
    }

    .menu-action[hidden] {
      display: none;
    }

    .menu-action:disabled {
      cursor: not-allowed;
      opacity: .38;
      transform: none;
    }

    .menu-action-icon {
      font-size: 18px;
      text-align: center;
    }

    .menu-action-meta {
      color: currentColor;
      opacity: .58;
      font-size: 11px;
    }

    .save-summary {
      min-height: 18px;
      margin: 4px 2px 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }

    .save-summary.success {
      color: var(--green);
    }

    .menu-footer {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, .09);
      color: var(--dim);
      font-size: 10px;
    }

    .speaker {
      width: 96px;
      height: 26px;
      border-radius: 0 0 18px 18px;
      background: #07080b;
      position: absolute;
      top: 0;
      left: 50%;
      z-index: 20;
      transform: translateX(-50%);
    }

    .status-bar {
      height: 44px;
      padding: 12px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 500;
      position: relative;
      z-index: 42;
      touch-action: none;
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .menu-launcher {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      padding: 0;
      border-radius: 6px;
      color: rgba(255, 255, 255, .84);
      background: rgba(255, 255, 255, .08);
      font-size: 15px;
      line-height: 1;
    }

    .shade-grip {
      position: absolute;
      left: 50%;
      top: 7px;
      width: 116px;
      height: 28px;
      transform: translateX(-50%);
      border-radius: 0 0 18px 18px;
      background: transparent;
      z-index: 44;
      cursor: grab;
      touch-action: none;
    }

    .signal {
      display: flex;
      align-items: center;
      gap: 5px;
      color: rgba(255, 255, 255, .88);
    }

    .battery {
      width: 24px;
      height: 12px;
      border: 1.5px solid currentColor;
      border-radius: 4px;
      padding: 2px;
      position: relative;
    }

    .battery::after {
      content: "";
      width: 2px;
      height: 6px;
      border-radius: 0 2px 2px 0;
      background: currentColor;
      position: absolute;
      right: -4px;
      top: 2px;
    }

    .battery span {
      display: block;
      width: 72%;
      height: 100%;
      border-radius: 2px;
      background: var(--green);
    }

    .screen {
      position: absolute;
      inset: 44px 0 0;
      display: flex;
      flex-direction: column;
    }

    .home-screen,
    .app-screen,
    .lock-screen {
      position: absolute;
      inset: 0;
      display: none;
      animation: appIn .22s ease both;
    }

    .home-screen.active,
    .app-screen.active,
    .lock-screen.active {
      display: flex;
    }

    .lock-screen {
      z-index: 32;
      flex-direction: column;
      justify-content: space-between;
      padding: 54px 24px 26px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .08), transparent 38%),
        radial-gradient(circle at 50% 18%, rgba(110, 214, 255, .24), transparent 32%),
        linear-gradient(160deg, #161b26, #090b10 68%);
    }

    .lock-top {
      text-align: center;
    }

    .lock-time {
      font-size: 64px;
      line-height: 1;
      font-weight: 500;
    }

    .lock-date {
      margin-top: 8px;
      color: rgba(255, 255, 255, .72);
      font-size: 14px;
    }

    .lock-notice {
      margin-top: 28px;
      padding: 13px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      background: rgba(255, 255, 255, .11);
      border: 1px solid rgba(255, 255, 255, .13);
      backdrop-filter: blur(16px);
      animation: notifyIn .55s ease both .25s;
    }

    .lock-unlock {
      display: grid;
      gap: 12px;
    }

    .lock-hint {
      text-align: center;
      color: rgba(255, 255, 255, .72);
      font-size: 13px;
    }

    .lock-pass {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .lock-pass input {
      min-width: 0;
      height: 46px;
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 16px;
      padding: 0 14px;
      background: rgba(255, 255, 255, .1);
      color: var(--text);
      outline: none;
      text-align: center;
      letter-spacing: 6px;
    }

    .lock-pass input:focus {
      border-color: rgba(110, 214, 255, .72);
      box-shadow: 0 0 0 4px rgba(110, 214, 255, .13);
    }

    .unlock-btn {
      width: 54px;
      height: 46px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      color: #071015;
      font-size: 20px;
    }

    .lock-error {
      min-height: 20px;
      color: var(--danger);
      text-align: center;
      font-size: 12px;
    }

    .swipe-pill {
      width: 132px;
      height: 5px;
      margin: 4px auto 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, .48);
      animation: breathe 1.8s ease-in-out infinite;
    }

    .home-screen {
      flex-direction: column;
      padding: 26px 24px 22px;
    }

    .date-card {
      margin-top: 12px;
    }

    .date-card .time {
      font-size: 54px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: 0;
    }

    .date-card .date {
      margin-top: 6px;
      color: rgba(255, 255, 255, .72);
      font-size: 14px;
    }

    .notice {
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, .1);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, .12);
      animation: notifyIn .45s ease both .15s;
    }

    .notice-icon {
      width: 34px;
      height: 34px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--green), #1a9f62);
      font-size: 18px;
    }

    /*
      角色头像统一从 assets 目录读取。object-fit 让不同尺寸的原图都能稳定填满头像框，
      object-position 稍微上移，避免方形裁切时把人物面部压到下方。
    */
    .character-avatar {
      object-fit: cover;
      object-position: 50% 34%;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, .24);
      background: #263028;
      box-shadow: 0 5px 14px rgba(0, 0, 0, .22);
    }

    img.notice-icon {
      flex: 0 0 34px;
      display: block;
    }

    /*
      应用 Logo：图形来自本地 Lucide 图标库并内嵌到页面。
      统一使用 currentColor，既能保持同一套线条语言，也方便不同应用使用独立配色。
    */
    .app-logo-svg {
      width: 30px;
      height: 30px;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .notice-icon .app-logo-svg {
      width: 20px;
      height: 20px;
      stroke-width: 2;
    }

    .logo-chat { color: #f4fff8; }
    .logo-gallery { color: #fff8eb; }
    .logo-docs { color: #f4fbff; }
    .logo-browser { color: #f5fbff; }
    .logo-social { color: #fff7fb; }
    .logo-videos { color: #fff5f6; }
    .logo-vault { color: #fff5d6; }
    .logo-ending { color: #fff7ed; }
    .logo-help { color: #f5fcff; }

    .notice b {
      display: block;
      font-size: 13px;
      font-weight: 500;
    }

    .notice span {
      color: rgba(255, 255, 255, .72);
      font-size: 12px;
    }

    .app-grid {
      margin-top: auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px 14px;
    }

    .app-icon {
      display: grid;
      justify-items: center;
      gap: 7px;
      background: transparent;
      padding: 0;
    }

    .icon-tile {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 25px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, .24), inset 0 1px 0 rgba(255, 255, 255, .28);
      position: relative;
      transition: transform .16s ease, filter .16s ease;
    }

    .app-icon:active .icon-tile,
    .choice-btn:active,
    .small-btn:active,
    .back-btn:active,
    .desktop-btn:active,
    .notice:active,
    .photo-card:active {
      transform: scale(.96);
      filter: brightness(1.12);
    }

    .app-icon > span:not(.icon-tile) {
      max-width: 68px;
      color: rgba(255, 255, 255, .88);
      font-size: 12px;
      text-shadow: 0 1px 5px rgba(0, 0, 0, .55);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      position: absolute;
      right: -6px;
      top: -5px;
      background: var(--danger);
      color: white;
      font-size: 11px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, .32);
    }

    .dock {
      margin-top: 22px;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      border-radius: 28px;
      background: rgba(255, 255, 255, .12);
      border: 1px solid rgba(255, 255, 255, .1);
      backdrop-filter: blur(18px);
    }

    .app-screen {
      flex-direction: column;
      background: var(--bg);
    }

    .notification-shade {
      position: absolute;
      inset: -44px 0 auto;
      min-height: 390px;
      padding: 58px 16px 18px;
      border-radius: 0 0 30px 30px;
      background: rgba(14, 17, 24, .86);
      border-bottom: 1px solid rgba(255, 255, 255, .12);
      backdrop-filter: blur(24px);
      box-shadow: 0 28px 70px rgba(0, 0, 0, .42);
      transform: translateY(-108%);
      transition: transform .32s cubic-bezier(.2, .8, .2, 1);
      z-index: 40;
      touch-action: none;
    }

    .notification-shade.open {
      transform: translateY(0);
    }

    .shade-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(255, 255, 255, .78);
      font-size: 13px;
      margin-bottom: 14px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .quick-toggle {
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      gap: 3px;
      background: rgba(255, 255, 255, .09);
      color: rgba(255, 255, 255, .86);
      font-size: 12px;
    }

    .quick-toggle.on {
      background: linear-gradient(135deg, rgba(64, 216, 131, .92), rgba(110, 214, 255, .78));
      color: #061015;
    }

    .shade-card {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-radius: 18px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, .1);
      border: 1px solid rgba(255, 255, 255, .1);
      text-align: left;
      width: 100%;
    }

    .shade-card b,
    .lock-notice b {
      display: block;
      margin-bottom: 3px;
      font-size: 13px;
      font-weight: 500;
    }

    .shade-card span,
    .lock-notice span {
      color: rgba(255, 255, 255, .7);
      font-size: 12px;
      line-height: 1.45;
    }

    /* 通知正文允许在弹性布局中收缩，避免长剧情消息把手机界面撑出屏幕。 */
    .notice > span:last-child,
    .shade-card > span:last-child,
    .lock-notice > span:last-child {
      min-width: 0;
      flex: 1;
    }

    .notice > span:last-child > span,
    .shade-card > span:last-child > span {
      display: block;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .shade-close {
      width: 118px;
      height: 5px;
      margin: 14px auto 0;

    .toast {

      left: 18px;
      right: 18px;
      top: 52px;
      z-index: 46;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(28, 32, 42, .92);
      border: 1px solid rgba(255, 255, 255, .12);
      box-shadow: 0 18px 45px rgba(0, 0, 0, .32);
      backdrop-filter: blur(18px);
      animation: toastDrop 3.2s ease both;
      pointer-events: none;
    }

    @keyframes phoneRise {
      from { transform: translateY(16px) scale(.985); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes appIn {
      from { transform: translateY(10px); opacity: .6; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes notifyIn {
      from { transform: translateY(-8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes messageIn {
      from { transform: translateY(6px) scale(.98); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes toastDrop {
      0% { transform: translateY(-22px); opacity: 0; }
      12%, 78% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-18px); opacity: 0; }
    }

    @keyframes breathe {
      0%, 100% { opacity: .45; transform: scaleX(.88); }
      50% { opacity: .9; transform: scaleX(1); }
    }

    @keyframes menuIn {
      from { opacity: 0; transform: scale(1.015); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 820px) {
      body {
        display: block;
      }

      .stage {
        min-height: 100vh;
        padding: 16px;
      }

      .phone-shell {
        width: min(100%, 390px);
      }
    }

    @media (max-width: 420px) {
      /*
        手机上的关键修复：父级必须有明确的 height，内部的 height: 100% 才能计算。
        之前这里只有 min-height，导致 .phone 在部分安卓浏览器里高度塌缩，
        锁屏内容层也随之变成 0，只剩顶部状态栏和一大片黑色外壳背景。

        先写 100vh 兼容旧浏览器，再用 100dvh 覆盖：动态视口单位会自动扣除
        浏览器地址栏和底部工具栏，更适合手机竖屏网页。
      */
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .stage {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        min-height: 0;
        padding: 0;
      }

      .phone-shell {
        width: 100%;
        height: 100%;
        min-height: 0;
        aspect-ratio: auto;
        border-radius: 0;
        padding: 0;
        background: #0d1017;
        box-shadow: none;
      }

      .phone {
        width: 100%;
        height: 100%;
        min-height: 0;
        border-radius: 0;
      }

      .speaker {
        display: none;
      }

      .start-menu {
        padding-top: max(42px, env(safe-area-inset-top));
        padding-bottom: max(22px, env(safe-area-inset-bottom));
      }

      .menu-title {
        font-size: 44px;
      }
    }

    /*
      有些手机浏览器会用大于 420px 的 CSS 视口，单靠宽度媒体查询仍会显示电脑外壳。
      粗指针且无悬停能力可以更可靠地识别触屏手机：隐藏模拟刘海、外框和阴影，
      让游戏直接铺满真实设备的可视区域；电脑仍保留原来的手机模型。
    */
    @media (hover: none) and (pointer: coarse) {
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0d1017;
      }

      body::before,
      .speaker {
        display: none;
      }

      .stage,
      .phone-shell,
      .phone {
        width: 100%;
        max-width: none;
        height: 100vh;
        height: 100dvh;
        min-height: 0;
        margin: 0;
        padding: 0;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }

      .phone-shell {
        aspect-ratio: auto;
        background: #0d1017;
      }

      .status-bar {
        height: calc(44px + env(safe-area-inset-top));
        padding-top: calc(12px + env(safe-area-inset-top));
      }

      .screen {
        inset: calc(44px + env(safe-area-inset-top)) 0 0;
      }

      .start-menu {
        border-radius: 0;
        padding-top: max(54px, calc(28px + env(safe-area-inset-top)));
        padding-bottom: max(22px, env(safe-area-inset-bottom));
      }
    }

    }

    .document-reader {
      min-height: 100%;
      padding: 18px 16px;
      overflow: auto;
      background: #161922;
    }

    .document-title {
      padding-bottom: 14px;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .document-title span,
    .document-title small {
      color: var(--dim);
      font-size: 11px;
    }

    .document-reader > p {
      min-height: 260px;
      color: rgba(245, 246, 250, .82);
    }

    .social-post {
      padding: 14px;
    }

    .post-author > span {
      min-width: 0;
    }

    .post-author b,
    .post-author small,
    .post-copy,
    .social-post .post-meta {
      display: block;
    }

    .post-author b {
      font-size: 14px;
      font-weight: 500;
    }

    .post-author small {
      margin-top: 2px;
      color: var(--dim);
      font-size: 11px;
    }

    .post-copy {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .social-post .post-image {
      min-height: 72px;
      margin: 12px 0 0;
      border-radius: 6px;
      background: linear-gradient(135deg, rgba(90, 140, 255, .2), rgba(255, 204, 102, .13)), #20242d;
    }

    .video-poster {
      position: relative;
      aspect-ratio: 16 / 10;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #090b0f;
    }

    .video-poster img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      opacity: .74;
    }

    .video-poster .play,
    .video-poster small,
    .audio-wave {
      position: absolute;
      z-index: 1;
    }

    .video-poster .play {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(10, 12, 17, .68);
      backdrop-filter: blur(8px);
    }

    .video-poster small {
      right: 10px;
      bottom: 8px;
      padding: 3px 6px;
      border-radius: 4px;
      background: rgba(0, 0, 0, .64);
      color: white;
      font-size: 10px;
    }

    .video-poster.large {
      aspect-ratio: 4 / 3;
    }

    .audio-wave {
      color: white;
      font-size: 28px;
      letter-spacing: 0;
      text-shadow: 0 3px 15px black;
    }

    .puzzle-panel input {
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .key-vault {
      padding: 24px 18px;
    }

    .key-chip {
      min-height: 160px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid rgba(255, 204, 102, .35);
      border-radius: 8px;
      background: linear-gradient(145deg, rgba(255, 204, 102, .16), rgba(110, 214, 255, .1)), #171a20;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .04);
    }

    .key-chip span,
    .key-chip small {
      color: var(--dim);
      font-size: 10px;
    }

    .key-chip b {
      font-size: 22px;
      font-weight: 500;
    }

    .key-vault p {
      margin: 18px 0;
    }

    .help-page {
      min-height: 100%;
      padding-bottom: 18px;
      overflow: auto;
      background: #11141b;
    }

    .help-band {
      padding: 18px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(110, 214, 255, .055);
    }

    .help-band span,
    .help-band b {
      display: block;
    }

    .help-band span {
      color: var(--dim);
      font-size: 11px;
    }

    .help-band b {
      margin: 4px 0;
      font-size: 25px;
      font-weight: 500;
    }

    .help-band p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .help-section {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .help-section h3 {
      margin: 0 0 12px;
      font-size: 13px;
      font-weight: 500;
    }

    .trust-row {
      display: grid;
      grid-template-columns: 34px 76px minmax(0, 1fr);
      align-items: center;
      gap: 9px;
      min-height: 44px;
    }

    .trust-row img {
      width: 34px;
      height: 34px;
    }

    .trust-row b,
    .trust-row small {
      display: block;
    }

    .trust-row b {
      font-size: 12px;
      font-weight: 500;
    }

    .trust-row small {
      color: var(--dim);
      font-size: 10px;
    }

    .trust-row i {
      height: 4px;
      overflow: hidden;
      border-radius: 99px;
      background: rgba(255, 255, 255, .08);
    }

    .trust-row em {
      height: 100%;
      display: block;
      border-radius: inherit;
    }

    .progress-item b,
    .progress-item small {
      display: block;
    }

    .progress-item b {
      font-size: 12px;
      font-weight: 400;
    }

    .progress-item small {
      margin-top: 2px;
      color: var(--dim);
      font-size: 10px;
    }

    .danger-choice {
      margin-top: 8px;
      color: #ff9aa4;
    }

    .final-ending,
    .locked-ending {
      min-height: 100%;
      padding: 28px 18px;
      overflow: auto;
      text-align: left;
    }

    .ending-kicker {
      color: var(--cyan);
      font-size: 10px;
      letter-spacing: .16em;
    }

    .final-ending h2,
    .locked-ending h2 {
      margin: 12px 0;
      font-size: 27px;
      font-weight: 500;
    }

    .ending-summary {
      color: var(--text);
      font-size: 14px;
      line-height: 1.75;
    }

    .ending-detail {
      padding: 14px 0;
      margin: 14px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .ending-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      margin-bottom: 18px;
    }

    .ending-stats span {
      color: var(--dim);
      font-size: 10px;
    }

    .ending-stats b {
      display: block;
      margin-top: 3px;
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <!--
    应用 Logo 矢量精灵：只定义一次，桌面、Dock、通知和应用标题通过 <use> 复用。
    这些路径取自项目内置的 Lucide 图标库，因此页面发布后不需要连接任何图标 CDN。
  -->
  <svg width="0" height="0" style="position:absolute;overflow:hidden" aria-hidden="true" focusable="false">
    <symbol id="logo-chat" viewBox="0 0 24 24">
      <path d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"/>
      <path d="M8 12h.01M12 12h.01M16 12h.01"/>
    </symbol>
    <symbol id="logo-gallery" viewBox="0 0 24 24">
      <path d="m22 11-1.296-1.296a2.4 2.4 0 0 0-3.408 0L11 16"/>
      <path d="M4 8a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2"/>
      <circle cx="13" cy="7" r="1" fill="currentColor"/>
      <rect x="8" y="2" width="14" height="14" rx="2"/>
    </symbol>
    <symbol id="logo-docs" viewBox="0 0 24 24">
      <path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/>
      <path d="M14 2v5a1 1 0 0 0 1 1h5M10 9H8M16 13H8M16 17H8"/>
    </symbol>
    <symbol id="logo-browser" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/>
      <path d="m16.24 7.76-1.804 5.411a2 2 0 0 1-1.265 1.265L7.76 16.24l1.804-5.411a2 2 0 0 1 1.265-1.265z"/>
    </symbol>
    <symbol id="logo-social" viewBox="0 0 24 24">
      <path d="M18 21a8 8 0 0 0-16 0"/>
      <circle cx="10" cy="8" r="5"/>
      <path d="M22 20c0-3.37-2-6.5-4-8a5 5 0 0 0-.45-8.3"/>
    </symbol>
    <symbol id="logo-videos" viewBox="0 0 24 24">
      <path d="m12.296 3.464 3.02 3.956M20.2 6 3 11l-.9-2.4c-.3-1.1.3-2.2 1.3-2.5l13.5-4c1.1-.3 2.2.3 2.5 1.3z"/>
      <path d="M3 11h18v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zM6.18 5.276l3.1 3.899"/>
    </symbol>
    <symbol id="logo-vault" viewBox="0 0 24 24">
      <circle cx="12" cy="16" r="1"/>
      <rect x="3" y="10" width="18" height="12" rx="2"/>
      <path d="M7 10V7a5 5 0 0 1 10 0v3"/>
    </symbol>
    <symbol id="logo-ending" viewBox="0 0 24 24">
      <path d="M4 22V4a1 1 0 0 1 .4-.8A6 6 0 0 1 8 2c3 0 5 2 7.333 2q2 0 3.067-.8A1 1 0 0 1 20 4v10a1 1 0 0 1-.4.8A6 6 0 0 1 16 16c-3 0-5-2-8-2a6 6 0 0 0-4 1.528"/>
    </symbol>
    <symbol id="logo-help" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/>
      <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01"/>
    </symbol>
  </svg>

  <main class="stage">
    <section class="phone-shell" aria-label="模拟手机">
      <div class="phone">
        <!--
          初始菜单始终是页面加载后的第一层画面。
          关闭菜单后才会看到模拟手机的锁屏或上次保存的应用界面。
        -->
        <section id="startMenu" class="start-menu active" aria-label="游戏主菜单" aria-hidden="false">
          <button class="menu-close" type="button" id="menuCloseBtn" aria-label="返回游戏" title="返回游戏">×</button>

          <div class="menu-heading">
            <div class="menu-kicker">INTERACTIVE MYSTERY</div>
            <h1 class="menu-title">雾港来信</h1>
            <p class="menu-subtitle">救人、真相、司法与隐私，没有一个选择完全干净。</p>
            <div class="menu-mark" aria-hidden="true"></div>
          </div>

          <div class="menu-actions">
            <button class="menu-action continue-action" type="button" id="continueGameBtn" hidden>
              <span class="menu-action-icon" aria-hidden="true">›</span>
              <span>继续游戏</span>
              <span class="menu-action-meta">返回当前画面</span>
            </button>
            <button class="menu-action primary" type="button" id="newGameBtn">
              <span class="menu-action-icon" aria-hidden="true">▶</span>
              <span>开始游戏</span>
              <span class="menu-action-meta">新档案</span>
            </button>
            <button class="menu-action" type="button" id="loadGameBtn">
              <span class="menu-action-icon" aria-hidden="true">↻</span>
              <span>读取游戏</span>
              <span class="menu-action-meta">读取存档</span>
            </button>
            <button class="menu-action" type="button" id="saveGameBtn" disabled>
              <span class="menu-action-icon" aria-hidden="true">▣</span>
              <span>保存游戏</span>
              <span class="menu-action-meta">当前进度</span>
            </button>
            <div class="save-summary" id="saveSummary" aria-live="polite">正在检查本地存档…</div>
          </div>

          <footer class="menu-footer">
            <span>制作者 · chandlerler</span>
            <span id="menuVersion">v1.05</span>
          </footer>
        </section>

        <div class="speaker" aria-hidden="true"></div>
        <div class="status-bar">
          <button class="shade-grip" type="button" id="shadeGrip" aria-label="打开通知栏"></button>
          <span class="status-left">
            <button class="menu-launcher" type="button" id="menuLauncher" aria-label="打开游戏菜单" title="游戏菜单">☰</button>
            <span id="clock">22:17</span>
          </span>
          <span class="signal">
            5G
            <span class="battery" aria-hidden="true"><span></span></span>
          </span>
        </div>

        <div class="screen">
          <section id="lockScreen" class="lock-screen active">
            <div class="lock-top">
              <div class="lock-time" id="lockTime">22:17</div>
              <div class="lock-date" id="lockDate">7月17日 周五 · 雾港市</div>
              <button class="lock-notice" type="button" data-lock-open-chat>
                <img class="notice-icon character-avatar" src="assets/avatars/linxia.jpg" alt="林夏">
                <span>
                  <b>林夏</b>
                  <span>别急着相信任何人，包括我。先解锁。</span>
                </span>
              </button>
            </div>

            <div class="lock-unlock">
              <div class="lock-hint">输入手机密码 · 提示：林夏最后同步的时间</div>
              <div class="lock-pass">
                <input id="phonePassInput" type="password" inputmode="numeric" maxlength="4" placeholder="••••" aria-label="手机解锁密码">
                <button class="unlock-btn" type="button" id="phoneUnlockBtn" aria-label="解锁手机">›</button>
              </div>
              <div class="lock-error" id="phoneLockError"></div>
              <div class="swipe-pill"></div>
            </div>
          </section>

          <div id="notificationShade" class="notification-shade" aria-hidden="true">
            <div class="shade-header">
              <span id="shadeDate">7月17日 周五</span>
              <span>旧手机</span>
            </div>
            <div class="quick-grid" aria-label="快捷开关">
              <button class="quick-toggle on" type="button">5G<br>在线</button>
              <button class="quick-toggle on" type="button">定位<br>开启</button>
              <button class="quick-toggle" type="button">静音<br>关闭</button>
              <button class="quick-toggle" type="button">电量<br>72%</button>
            </div>
            <button class="shade-card" type="button" data-open-app="chat">
              <img class="notice-icon character-avatar" src="assets/avatars/linxia.jpg" alt="">
              <span>
                <b>微讯 · 林夏</b>
                <span id="shadeNoticeText">旧手机里留下了新的调查线索。</span>
              </span>
            </button>
            <button class="shade-card" type="button" data-open-app="help">
              <span class="notice-icon" style="background:linear-gradient(135deg,#6ed6ff,#5a8cff)">
                <svg class="app-logo-svg logo-help" aria-hidden="true"><use href="#logo-help"></use></svg>
              </span>
              <span>
                <b>系统帮助</b>
                <span>忘记下一步时，可以在帮助里看当前进度和提示。</span>
              </span>
            </button>
            <button class="shade-close" type="button" id="shadeClose" aria-label="收起通知栏"></button>
          </div>

          <section id="homeScreen" class="home-screen">
            <div class="date-card">
              <div class="time" id="homeTime">22:17</div>
              <div class="date" id="homeDate">7月17日 周五 · 雾港市</div>
            </div>

            <button class="notice" type="button" data-open-app="chat">
              <img class="notice-icon character-avatar" src="assets/avatars/linxia.jpg" alt="">
              <span>
                <b>林夏</b>
                <span id="noticeText">旧手机里留下了新的调查线索。</span>
              </span>
            </button>

            <div class="app-grid" aria-label="手机桌面应用">
              <button class="app-icon" type="button" data-open-app="chat">
                <span class="icon-tile" style="background:linear-gradient(135deg,#40d883,#159c5b)">
                  <svg class="app-logo-svg logo-chat" aria-hidden="true"><use href="#logo-chat"></use></svg>
                  <span id="chatBadge" class="badge">1</span>
                </span>
                <span>微讯</span>
              </button>
              <button class="app-icon" type="button" data-open-app="gallery">
                <span class="icon-tile" style="background:linear-gradient(135deg,#ffcc66,#ff7ba8)">
                  <svg class="app-logo-svg logo-gallery" aria-hidden="true"><use href="#logo-gallery"></use></svg>
                </span>
                <span>相册</span>
              </button>
              <button class="app-icon" type="button" data-open-app="docs">
                <span class="icon-tile" style="background:linear-gradient(135deg,#6ed6ff,#5a8cff)">
                  <svg class="app-logo-svg logo-docs" aria-hidden="true"><use href="#logo-docs"></use></svg>
                </span>
                <span>文档</span>
              </button>
              <button class="app-icon" type="button" data-open-app="browser">
                <span class="icon-tile" style="background:linear-gradient(135deg,#8ee7ff,#6f87ff)">
                  <svg class="app-logo-svg logo-browser" aria-hidden="true"><use href="#logo-browser"></use></svg>
                </span>
                <span>浏览器</span>
              </button>
              <button class="app-icon" type="button" data-open-app="social">
                <span class="icon-tile" style="background:linear-gradient(135deg,#ff8fb8,#a88bff)">
                  <svg class="app-logo-svg logo-social" aria-hidden="true"><use href="#logo-social"></use></svg>
                </span>
                <span>朋友圈</span>
              </button>
              <button class="app-icon" type="button" data-open-app="videos">
                <span class="icon-tile" style="background:linear-gradient(135deg,#ef6a72,#48252d)">
                  <svg class="app-logo-svg logo-videos" aria-hidden="true"><use href="#logo-videos"></use></svg>
                </span>
                <span>视频</span>
              </button>
              <button class="app-icon" type="button" data-open-app="vault">
                <span class="icon-tile" style="background:linear-gradient(135deg,#4f5360,#16181e)">
                  <svg class="app-logo-svg logo-vault" aria-hidden="true"><use href="#logo-vault"></use></svg>
                </span>
                <span>密钥库</span>
              </button>
              <button class="app-icon" type="button" data-open-app="ending">
                <span class="icon-tile" style="background:linear-gradient(135deg,#ff9d66,#a23a54)">
                  <svg class="app-logo-svg logo-ending" aria-hidden="true"><use href="#logo-ending"></use></svg>
                </span>
                <span>抉择</span>
              </button>
              <button class="app-icon" type="button" data-open-app="help">
                <span class="icon-tile" style="background:linear-gradient(135deg,#42d6c4,#4d7ff2)">
                  <svg class="app-logo-svg logo-help" aria-hidden="true"><use href="#logo-help"></use></svg>
                </span>
                <span>调查簿</span>
              </button>
            </div>

            <div class="dock">
              <button class="app-icon" type="button" data-open-app="chat">
                <span class="icon-tile" style="background:linear-gradient(135deg,#40d883,#159c5b)">
                  <svg class="app-logo-svg logo-chat" aria-hidden="true"><use href="#logo-chat"></use></svg>
                </span>
              </button>
              <button class="app-icon" type="button" data-open-app="browser">
                <span class="icon-tile" style="background:linear-gradient(135deg,#8ee7ff,#6f87ff)">
                  <svg class="app-logo-svg logo-browser" aria-hidden="true"><use href="#logo-browser"></use></svg>
                </span>
              </button>
              <button class="app-icon" type="button" data-open-app="docs">
                <span class="icon-tile" style="background:linear-gradient(135deg,#6ed6ff,#5a8cff)">
                  <svg class="app-logo-svg logo-docs" aria-hidden="true"><use href="#logo-docs"></use></svg>
                </span>
              </button>
              <button class="app-icon" type="button" data-open-app="vault">
                <span class="icon-tile" style="background:linear-gradient(135deg,#4f5360,#16181e)">
                  <svg class="app-logo-svg logo-vault" aria-hidden="true"><use href="#logo-vault"></use></svg>
                </span>
              </button>
              <button class="app-icon" type="button" data-open-app="help">
                <span class="icon-tile" style="background:linear-gradient(135deg,#42d6c4,#4d7ff2)">
                  <svg class="app-logo-svg logo-help" aria-hidden="true"><use href="#logo-help"></use></svg>
                </span>
              </button>
            </div>
          </section>

          <section id="appScreen" class="app-screen" aria-live="polite">
            <header class="app-header">
              <button class="back-btn" type="button" id="backBtn" aria-label="返回桌面">‹</button>
              <div class="app-title" id="appTitle">应用</div>
              <button class="small-btn" type="button" id="hintBtn">提示</button>
            </header>
            <div class="app-body" id="appBody"></div>
            <div class="bottom-home">
              <button class="home-indicator-btn" type="button" id="homeBtn" aria-label="回到桌面"></button>
            </div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <!-- 版本参数用于绕过手机浏览器对拆分脚本的旧缓存，避免 HTML 与剧情引擎版本不一致。 -->
  <script src="data/characters.js?v=1.05.3"></script>
  <script src="data/dialogues.js?v=1.05.3"></script>
  <script src="data/clues.js?v=1.05.3"></script>
  <script src="data/events.js?v=1.05.3"></script>
  <script src="data/endings.js?v=1.05.3"></script>
  <script src="game.js?v=1.05.3"></script>
</body>
</html>
